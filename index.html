<!DOCTYPE html>
<html lang="zh-Hant-TW">
    <head>
        <meta charset="UTF-8" />
        <link rel="icon" type="image/svg+xml" href="/logo.png" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
        />
        <title>Howie</title>

        <!-- GTM -->
        <script>
            (function (w, d, s, l, i) {
                w[l] = w[l] || [];
                w[l].push({ 'gtm.start': new Date().getTime(), event: 'gtm.js' });
                var f = d.getElementsByTagName(s)[0],
                    j = d.createElement(s),
                    dl = l != 'dataLayer' ? '&l=' + l : '';
                j.async = true;
                j.src = 'https://www.googletagmanager.com/gtm.js?id=' + i + dl;
                f.parentNode.insertBefore(j, f);
            })(window, document, 'script', 'dataLayer', 'GTM-M3VG2BXJ');
        </script>
    </head>
    <body>
        <!-- GTM -->
        <noscript
            ><iframe
                src="https://www.googletagmanager.com/ns.html?id=GTM-M3VG2BXJ"
                height="0"
                width="0"
                style="display: none; visibility: hidden"
            ></iframe
        ></noscript>

        <div id="root"></div>
        <script type="module" src="/src/main.tsx"></script>

        <!-- redirect -->
        <script>
            (function () {
                const redirect = sessionStorage.redirect;
                delete sessionStorage.redirect;
                if (redirect && redirect !== location.href) {
                    history.replaceState(null, null, redirect);
                }
            })();
        </script>

        <script>
            function createModal() {
                // Create CSS
                const gtmStyle = document.createElement('style');
                gtmStyle.textContent = `
                    * {
                        margin: 0;
                        padding: 0;
                        box-sizing: border-box;
                    }

                    .gtm-modal-background {
                        display: block;
                        position: fixed;
                        z-index: 999999;
                        left: 0;
                        top: 0;
                        width: 100%;
                        height: 100%;
                        overflow: auto;
                        background-color: rgba(0, 0, 0, 0.5);
                    }

                    .gtm-modal-hidden {
                        display: none;
                    }

                    .gtm-modal-content {
                        position: relative;
                        background-color: #fff;
                        margin: 15% auto;
                        padding: 20px;
                        border: 1px solid #888;
                        width: 50%;
                        border-radius: 4px;
                    }

                    .gtm-close-button {
                        position: absolute;
                        top: 4px;
                        right: 8px;
                        cursor: pointer;
                    }
                `;
                document.head.appendChild(gtmStyle);

                // Background
                const gtmModalBackground = document.createElement('div');
                gtmModalBackground.classList.add('gtm-modal-background');

                // Content
                const gtmModalContent = document.createElement('div');
                gtmModalContent.classList.add('gtm-modal-content');

                // Text
                gtmModalContent.innerHTML = `
                    <span class="gtm-close-button">&times;</span>
                    <div>自定義標題</div>
                    <p>自定義內容</p>
                `;

                gtmModalBackground.appendChild(gtmModalContent);
                document.body.appendChild(gtmModalBackground);

                // Button
                const gtmCloseBtn = document.querySelector('.gtm-close-button');
                gtmCloseBtn.addEventListener('click', function () {
                    gtmModalBackground.classList.add('gtm-modal-hidden');
                });

                return gtmModalBackground;
            }
            createModal();
        </script>

        <!-- build time-->
    </body>
</html>
